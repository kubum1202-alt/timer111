<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buds Smart Timer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --danger-color: #f43f5e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        /* 시작 오버레이 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #start-btn {
            padding: 20px 50px; font-size: 1.5rem; font-weight: bold;
            background: var(--accent-color); border: none; border-radius: 15px;
            color: #0f172a; cursor: pointer;
        }

        /* 메인 UI */
        .container { text-align: center; width: 90%; max-width: 400px; }

        .input-group {
            margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        input[type="number"] {
            width: 100px; padding: 10px; font-size: 1.5rem;
            background: var(--card-bg); border: 2px solid #334155;
            color: white; border-radius: 10px; text-align: center;
        }

        .timer-display {
            font-size: 7rem; font-weight: 800; margin: 20px 0;
            cursor: pointer; transition: transform 0.1s;
            font-variant-numeric: tabular-nums;
        }

        .timer-display:active { transform: scale(0.95); }

        .status-badge {
            padding: 8px 20px; border-radius: 30px; font-size: 1rem;
            background: var(--card-bg); border: 1px solid #334155; margin-bottom: 10px;
        }

        .running { color: var(--accent-color); border-color: var(--accent-color); }
        .danger { color: var(--danger-color); border-color: var(--danger-color); animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); }
        }

        .hint { color: #64748b; font-size: 0.9rem; margin-top: 30px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 10px;">Buds Timer</h2>
        <p style="color: #64748b; margin-bottom: 30px;">소리 및 버튼 권한을 활성화합니다.</p>
        <button id="start-btn">시작하기</button>
    </div>

    <div class="container">
        <div id="status" class="status-badge">대기 중</div>
        
        <div class="input-group" id="setting-ui">
            <input type="number" id="sec-input" value="60" min="1" max="3600">
            <span style="font-size: 1.5rem;">초 설정</span>
        </div>

        <div id="timer" class="timer-display" onclick="toggleTimer()">60</div>

        <div class="hint">
            이어폰 <b>버튼</b> 또는 <b>화면 터치</b> 시 작동<br>
            5초 전부터 알림음 발생
        </div>
    </div>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        let timeLeft = 60;
        let timerInterval = null;
        let isRunning = false;
        
        const timerDisplay = document.getElementById('timer');
        const statusBadge = document.getElementById('status');
        const secInput = document.getElementById('sec-input');
        const settingUi = document.getElementById('setting-ui');
        const silentAudio = document.getElementById('silent-audio');
        const overlay = document.getElementById('overlay');

        // Web Audio API를 이용한 '삐' 소리 생성 함수
        let audioCtx = null;
        function playBeep(duration, frequency, volume = 0.2) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency; 
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        secInput.addEventListener('input', () => {
            if (!isRunning) {
                timeLeft = parseInt(secInput.value) || 0;
                timerDisplay.textContent = timeLeft;
            }
        });

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        function startTimer() {
            if (isRunning) return;
            if (timeLeft <= 0) timeLeft = parseInt(secInput.value) || 60;

            isRunning = true;
            statusBadge.textContent = "실행 중";
            statusBadge.className = "status-badge running";
            settingUi.style.visibility = "hidden";
            
            silentAudio.play();
            updateMediaSession('playing');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                // 5초 전부터 1초 전까지 짧은 삐 소리 (880Hz)
                if (timeLeft <= 5 && timeLeft > 0) {
                    statusBadge.className = "status-badge danger";
                    playBeep(0.1, 880); 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            statusBadge.textContent = "일시정지";
            statusBadge.className = "status-badge";
            settingUi.style.visibility = "visible";
            clearInterval(timerInterval);
            updateMediaSession('paused');
        }

        function completeTimer() {
            isRunning = false;
            statusBadge.textContent = "종료됨";
            statusBadge.className = "status-badge";
            settingUi.style.visibility = "visible";
            
            // 종료 시 1초간 긴 삐 소리 (440Hz)
            playBeep(1.0, 440, 0.3);
            
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            updateMediaSession('paused');
        }

        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', toggleTimer);
                navigator.mediaSession.setActionHandler('pause', toggleTimer);
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: '스마트 타이머',
                    artist: '이어폰 버튼 제어',
                    album: 'Timer'
                });
            }
        }

        function updateMediaSession(state) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = state;
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            overlay.style.display = 'none';
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            silentAudio.play().then(() => {
                setupMediaSession();
            });
        });
    </script>
</body>
</html>
