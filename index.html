<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buds Pro Smart Timer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --danger-color: #f43f5e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        /* 시작 오버레이 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #start-btn {
            padding: 20px 50px; font-size: 1.5rem; font-weight: bold;
            background: var(--accent-color); border: none; border-radius: 15px;
            color: #0f172a; cursor: pointer;
        }

        /* 메인 UI */
        .container { text-align: center; width: 90%; max-width: 400px; }

        /* 시간 설정 영역 */
        .input-group {
            margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        input[type="number"] {
            width: 100px; padding: 10px; font-size: 1.5rem;
            background: var(--card-bg); border: 2px solid #334155;
            color: white; border-radius: 10px; text-align: center;
        }

        /* 타이머 디스플레이 - 클릭 가능 */
        .timer-display {
            font-size: 7rem; font-weight: 800; margin: 20px 0;
            cursor: pointer; transition: transform 0.1s;
            font-variant-numeric: tabular-nums;
        }

        .timer-display:active { transform: scale(0.95); }

        .status-badge {
            padding: 8px 20px; border-radius: 30px; font-size: 1rem;
            background: var(--card-bg); border: 1px solid #334155; margin-bottom: 10px;
        }

        .running { color: var(--accent-color); border-color: var(--accent-color); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .danger { color: var(--danger-color); border-color: var(--danger-color); animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); }
        }

        .hint { color: #64748b; font-size: 0.9rem; margin-top: 30px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 10px;">Buds 3 Pro Timer</h2>
        <p style="color: #64748b; margin-bottom: 30px;">음성 및 버튼 권한을 활성화합니다.</p>
        <button id="start-btn">시작하기</button>
    </div>

    <div class="container">
        <div id="status" class="status-badge">대기 중</div>
        
        <!-- 시간 설정 -->
        <div class="input-group" id="setting-ui">
            <input type="number" id="sec-input" value="60" min="1" max="3600">
            <span style="font-size: 1.5rem;">초 설정</span>
        </div>

        <!-- 타이머 (터치 시 토글) -->
        <div id="timer" class="timer-display" onclick="toggleTimer()">60</div>

        <div class="hint">
            줄기 <b>핀치</b> 또는 <b>화면 터치</b> 시 작동<br>
            10초 전부터 음성 카운트다운 시작
        </div>
    </div>

    <!-- 배경 유지용 무음 오디오 -->
    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        let initialSeconds = 60;
        let timeLeft = 60;
        let timerInterval = null;
        let isRunning = false;
        
        const timerDisplay = document.getElementById('timer');
        const statusBadge = document.getElementById('status');
        const secInput = document.getElementById('sec-input');
        const settingUi = document.getElementById('setting-ui');
        const silentAudio = document.getElementById('silent-audio');
        const overlay = document.getElementById('overlay');

        // 음성 합성 (TTS) 설정
        const synth = window.speechSynthesis;
        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ko-KR';
            utter.rate = 1.2;
            synth.speak(utter);
        }

        // 입력값 변경 시 타이머 즉시 반영
        secInput.addEventListener('input', () => {
            if (!isRunning) {
                timeLeft = parseInt(secInput.value) || 0;
                timerDisplay.textContent = timeLeft;
            }
        });

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        function startTimer() {
            if (isRunning) return;
            
            // 종료 상태에서 다시 시작 시 리셋
            if (timeLeft <= 0) {
                timeLeft = parseInt(secInput.value) || 60;
            }

            isRunning = true;
            statusBadge.textContent = "실행 중";
            statusBadge.className = "status-badge running";
            settingUi.style.visibility = "hidden"; // 실행 중엔 설정 숨김
            
            silentAudio.play();
            updateMediaSession('playing');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                // 10초 이하일 때 음성 카운트다운
                if (timeLeft <= 10 && timeLeft > 0) {
                    statusBadge.className = "status-badge danger";
                    speak(timeLeft.toString());
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            statusBadge.textContent = "일시정지";
            statusBadge.className = "status-badge";
            settingUi.style.visibility = "visible";
            clearInterval(timerInterval);
            updateMediaSession('paused');
        }

        function completeTimer() {
            isRunning = false;
            statusBadge.textContent = "종료됨";
            statusBadge.className = "status-badge";
            settingUi.style.visibility = "visible";
            speak("타이머가 종료되었습니다.");
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            updateMediaSession('paused');
        }

        // 미디어 세션 (버즈 신호 수신)
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', toggleTimer);
                navigator.mediaSession.setActionHandler('pause', toggleTimer);
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: '스마트 타이머',
                    artist: 'Buds 3 Pro 컨트롤',
                    album: 'Timer'
                });
            }
        }

        function updateMediaSession(state) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = state;
            }
        }

        // 시작 버튼
        document.getElementById('start-btn').addEventListener('click', () => {
            overlay.style.display = 'none';
            silentAudio.play().then(() => {
                setupMediaSession();
                // 첫 클릭 시 TTS 권한 획득을 위해 무음 출력
                speak(""); 
            });
        });
    </script>
</body>
</html>
